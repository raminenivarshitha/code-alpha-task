<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="tracker">

        <h1>💰 Expense Tracker</h1>

        <!-- Balance -->

        <div class="balance-card">

            <h3>Total Balance</h3>

            <h2 id="balance">₹0.00</h2>

        </div>

        <!-- Income & Expense -->

        <div class="summary">

            <div class="income">

                <h3>Income</h3>

                <p id="income">₹0.00</p>

            </div>

            <div class="expense">

                <h3>Expense</h3>

                <p id="expense">₹0.00</p>

            </div>

        </div>

        <!-- Form -->

        <div class="form">

            <input
                type="text"
                id="text"
                placeholder="Enter Description">

            <input
                type="number"
                id="amount"
                placeholder="Enter Amount">

            <select id="type">

                <option value="income">
                    Income
                </option>

                <option value="expense">
                    Expense
                </option>

            </select>

            <button id="addBtn">
                Add Transaction
            </button>

        </div>

        <!-- Filter -->

        <div class="filters">

            <button class="filter active" data-filter="all">
                All
            </button>

            <button class="filter" data-filter="income">
                Income
            </button>

            <button class="filter" data-filter="expense">
                Expense
            </button>

        </div>

        <!-- History -->

        <h2 class="history-title">
            Transaction History
        </h2>

        <ul id="transactionList">

        </ul>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
